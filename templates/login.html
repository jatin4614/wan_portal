<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Vajr Comn State</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo-sm.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background: linear-gradient(135deg, #0c4a6e 0%, #075985 50%, #0369a1 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .login-card {
      background: var(--bg-card);
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 32px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }
    .login-logo img {
      height: 96px;
      width: 96px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
    }
    .login-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-sub {
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .login-form .field { display: flex; flex-direction: column; gap: 6px; }
    .login-form input[type=text],
    .login-form input[type=password] {
      width: 100%;
      box-sizing: border-box;
      height: 44px;
      padding: 0 14px;
      font-size: 14px;
    }
    .login-form button {
      width: 100%;
      box-sizing: border-box;
      height: 46px;
    }
    .flash-error {
      background: var(--bad-bg);
      color: var(--bad);
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Vajr Signals">
    </div>
    <div class="login-title">VAJR COMN STATE</div>
    <div class="login-sub">SIGN IN TO CONTINUE</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
